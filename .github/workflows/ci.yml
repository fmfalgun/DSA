name: CI

on:
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed .cpp files
        id: changed
        run: |
          git fetch origin "${{ github.base_ref }}"
          files=$(git diff --name-only --diff-filter=ACM "origin/${{ github.base_ref }}...HEAD" -- 'data-structures/**/*.cpp')
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment presence check
        if: steps.changed.outputs.files != ''
        run: echo "${{ steps.changed.outputs.files }}" | xargs ./scripts/check-comments.sh

      - name: Magic number check
        if: steps.changed.outputs.files != ''
        run: echo "${{ steps.changed.outputs.files }}" | xargs ./scripts/check-magic-numbers.sh

      - name: Compile + sample test check
        if: steps.changed.outputs.files != ''
        run: echo "${{ steps.changed.outputs.files }}" | xargs ./scripts/run-tests.sh

      - name: Commit message check
        run: ./scripts/check-commit-msg.sh --range "origin/${{ github.base_ref }}...HEAD"
